<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>字体预览库（高级版）</title>
  <style>
    :root { --bg:#0f1220; --card:#171a2b; --text:#e7e9ff; --muted:#9aa0c3; --border:#2a2f4a; }
    * { box-sizing: border-box; }
    body { margin:0; background: radial-gradient(1200px 800px at 20% -10%, #1b2040, #0f1220); color:var(--text); font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial; }
    .container { max-width:1200px; margin:0 auto; padding:20px; }
    h1 { margin:0 0 12px; font-size:24px; }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .input, .search { background:#0c0f1d; border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:12px; outline:none; }
    .input { flex:1; min-width:240px; font-size:16px; }
    .search { width:220px; }
    .hint { color:var(--muted); font-size:12px; }
    .grid { display:grid; grid-template-columns: repeat(1, 1fr); gap:12px; margin-top:16px; }
    @media (min-width:640px){ .grid{ grid-template-columns: repeat(2, 1fr);} }
    @media (min-width:1024px){ .grid{ grid-template-columns: repeat(3, 1fr);} }
    .card { background: linear-gradient(180deg, #171a2b, #141733); border:1px solid var(--border); border-radius:18px; padding:14px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .name { color:var(--muted); font-size:12px; }
    .btn { cursor:pointer; border:1px solid var(--border); background:#0c0f1d; color:var(--text); border-radius:10px; padding:6px 10px; font-size:12px; }
    .btn:hover { background:#11153a; }
    .preview { font-size:28px; line-height:1.4; word-break: break-word; }
    .empty { color:var(--muted); text-align:center; padding:40px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>字体预览库（高级版）</h1>
    <div class="toolbar">
      <input id="textInput" class="input" value="输入你想预览的文字" />
      <input id="searchInput" class="search" placeholder="搜索字体文件名" />
    </div>
    <div class="hint">提示：将字体文件（.ttf/.otf/.woff2）与本文件放在同一目录，并按规则命名，如 font1.ttf ~ font123.ttf</div>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">没有匹配的字体</div>
  </div>

  <script>
   const fonts = [
  { family: "FZBSJW", file: "FZBSJW.TTF" },
  { family: "FZBWKSFW", file: "FZBWKSFW.TTF" },
  { family: "fz3", file: "FZBWKSJW.TTF" },
  { family: "fz4", file: "FZCCHFW.TTF" },
  { family: "fz5", file: "FZCCHJW.TTF" },
  { family: "fz6", file: "FZCHYFW.TTF" },
  { family: "fz7", file: "FZCHYJW.TTF" },
  { family: "fz8", file: "FZCQFW.TTF" },
  { family: "fz9", file: "FZCQJW.TTF" },
  { family: "fz10", file: "FZCSFW.TTF" }
];

    // ===== 2) 动态注入 @font-face =====
    const styleEl = document.createElement('style');
    document.head.appendChild(styleEl);
    styleEl.textContent = fonts.map(f => `
      @font-face {
        font-family: ${f.family};
        src: url("${f.file}");
        font-display: swap;
      }
    `).join('\n');

    // ===== 3) 渲染卡片 =====
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const textInput = document.getElementById('textInput');
    const searchInput = document.getElementById('searchInput');

    function render(list) {
      grid.innerHTML = '';
      if (!list.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const frag = document.createDocumentFragment();
      list.forEach((f, idx) => {
        const card = document.createElement('div');
        card.className = 'card';

        const meta = document.createElement('div');
        meta.className = 'meta';

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = f.file;

        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = '复制名称';
        btn.onclick = () => {
          navigator.clipboard.writeText(f.file);
          btn.textContent = '已复制';
          setTimeout(() => btn.textContent = '复制名称', 1200);
        };

        meta.appendChild(name);
        meta.appendChild(btn);

        const preview = document.createElement('div');
        preview.className = 'preview';
        preview.style.fontFamily = f.family;
        preview.textContent = textInput.value;

        card.appendChild(meta);
        card.appendChild(preview);
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }

    // 初始渲染
    render(fonts);

    // ===== 4) 输入联动 =====
    textInput.addEventListener('input', () => {
      const val = textInput.value;
      document.querySelectorAll('.preview').forEach(el => el.textContent = val);
      // 同步到URL（可分享）
      const url = new URL(location.href);
      url.searchParams.set('text', val);
      history.replaceState(null, '', url);
    });

    // ===== 5) 搜索过滤 =====
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      const list = fonts.filter(f => f.file.toLowerCase().includes(q));
      render(list);
      // 重新应用当前文本
      const val = textInput.value;
      document.querySelectorAll('.preview').forEach(el => el.textContent = val);
    });

    // ===== 6) 读取分享参数 =====
    const params = new URLSearchParams(location.search);
    const sharedText = params.get('text');
    if (sharedText) {
      textInput.value = sharedText;
      document.querySelectorAll('.preview').forEach(el => el.textContent = sharedText);
    }
  </script>
</body>
</html>
